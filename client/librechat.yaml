# For more information, see the Configuration Guide:
# https://www.librechat.ai/docs/configuration/librechat_yaml

# Configuration version (required)
version: 1.1.4

# Cache settings: Set to true to enable caching
cache: true

fileStrategy: "firebase"

fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 10
      totalSizeLimit: 50
      supportedMimeTypes:
        - "*"
  serverFileSizeLimit: 1000
  avatarSizeLimit: 2
 

# Custom interface configuration
interface:
  # Privacy policy settings
  privacyPolicy:
    externalUrl: 'https://librechat.ai/privacy-policy'
    openNewTab: true

  # Terms of service
  termsOfService:
    externalUrl: 'https://librechat.ai/tos'
    openNewTab: true

# Example Registration Object Structure (optional)
registration:
  socialLogins: ['github', 'discord', 'google']
  allowedDomains:
   - "*"
# rateLimits:
#   fileUploads:
#     ipMax: 100
#     ipWindowInMinutes: 60  # Rate limit window for file uploads per IP
#     userMax: 50
#     userWindowInMinutes: 60  # Rate limit window for file uploads per user
#   conversationsImport:
#     ipMax: 100
#     ipWindowInMinutes: 60  # Rate limit window for conversation imports per IP
#     userMax: 50
#     userWindowInMinutes: 60  # Rate limit window for conversation imports per user

# Definition of custom endpoints
endpoints:
  custom:
    - name: "TalexCK's Chat Bot"
      apiKey: "${TCB_API_KEY}"
      baseURL: "https://api3.talexck.top/v1/chat/completions"
      models:
        default: [
          "talexck_chat_bot_v1",
          ]
        fetch: true
      titleConvo: true
      titleModel: "talexck_chat_bot_v1"
      summarize: false
      summaryModel: "talexck_chat_bot_v1"
      forcePrompt: false
      modelDisplayLabel: "TalexCK's Chat Bot"
      iconURL: 'https://avatars.githubusercontent.com/u/84849086?v=4'
    - name: "OpenRouter"
      # For `apiKey` and `baseURL`, you can use environment variables that you define.
